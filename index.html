<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ministerio de Louvor Amar - App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="App para envio de mensagens em grupo no WhatsApp">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WhatsMinister">
    <style>
        :root {
            --primary-blue: #0a1931;
            --accent-blue: #185adb;
            --accent-red: #ff0000;
            --bg-dark: #050a18;
            --white: #FFFFFF;
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.1);
            --dark-green: #2ecc71; /* Verde mais vibrante para contraste no escuro */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 10, 24, 0.8), rgba(5, 10, 24, 0.8)), url('mins/minislogo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-weight: 400;
        }

        header {
            width: 100%;
            background-color: rgba(10, 25, 49, 0.9);
            color: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .logo-text {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--white);
        }

        .logo-text span {
            color: var(--accent-red);
        }

        header p {
            color: var(--white) !important;
            font-weight: 300;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--white);
            text-shadow: 1px 1px 2px rgba(236, 54, 54, 0.5);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            resize: none;
            outline: none;
            background-color: var(--card-bg);
            color: var(--white);
            backdrop-filter: blur(5px);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(24, 90, 219, 0.3);
        }

        .btn-send {
            background-color: var(--accent-blue);
            color: var(--white);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(3, 33, 94, 0.795);
            transition: transform 0.1s, opacity 0.2s, background-color 0.2s;
            width: 100%;
        }

        .btn-send:hover {
            background-color: #07328a;
        }

        .btn-send span {
            width: 100%;
            text-align: center;
        }

        .btn-send:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .quick-messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quick-messages label {
            color: var(--white);
        }

        .upload-section {
            background-color: var(--card-bg);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background-color 0.2s, border-color 0.2s;
            color: var(--white);
        }

        .upload-section p {
            color: var(--white) !important;
        }

        .upload-section:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: var(--white);
        }

        .preview-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .preview-image:active {
            transform: scale(1.02);
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 12px;
        }

        /* Grade específica para Cronograma em Desktop/Tablet */
        #fullScheduleGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Colunas conforme solicitado */
            gap: 15px;
            max-height: 70vh; /* Altura máxima para ativar rolagem */
            overflow-y: auto; /* Ativa barra de rolagem */
            padding-right: 10px;
            padding-bottom: 20px;
        }

        /* Estilização da Barra de Rolagem */
        #fullScheduleGrid::-webkit-scrollbar {
            width: 6px;
        }

        #fullScheduleGrid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #fullScheduleGrid::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 10px;
        }

        /* Responsividade para telas menores (Celular) */
        @media (max-width: 480px) {
            #fullScheduleGrid {
                grid-template-columns: repeat(1, 1fr); /* Volta para 1 coluna no celular */
            }
        }

        .status-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-past {
            background-color: rgba(255, 0, 0, 0.3);
            color: #ffffff;
            border: 1px solid #ff4d4d;
        }

        .status-upcoming {
            background-color: rgba(0, 255, 0, 0.2);
            color: #ffffff;
            border: 1px solid #4dff4d;
        }

        .quick-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: var(--white);
        }

        .quick-card:active {
            transform: scale(0.98);
            background-color: rgba(255,255,255,0.25);
        }

        .quick-card h4 {
            margin: 0;
            font-size: 16px;
            color: var(--white);
            font-weight: 600;
        }

        .quick-card p {
            margin: 0;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 300;
        }

        #imageModal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #modalImg {
            max-width: 95%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .close-modal {
            color: white;
            font-size: 40px;
            font-weight: bold;
            position: absolute;
            top: 20px;
            right: 30px;
            cursor: pointer;
        }

        .footer-info {
            margin-top: auto;
            padding: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-weight: 300;
        }

        /* LOGIN OVERLAY */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 10, 24, 0.95);
            background-image: linear-gradient(rgba(5, 10, 24, 0.9), rgba(5, 10, 24, 0.9)), url('mins/minislogo.png');
            background-size: cover;
            background-position: center;
            z-index: 2000;
            display: none; /* Oculto por padrão */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .close-login {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
        }

        .close-login:hover {
            opacity: 1;
        }

        .login-card h2 {
            margin: 0 0 10px 0;
            color: var(--white);
        }

        .login-card p {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
        }

        .login-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--accent-blue);
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .header-login-btn {
            background: var(--accent-blue);
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            display: block; /* Garante que ocupe sua própria linha */
            margin-left: auto; /* Centraliza */
            margin-right: auto; /* Centraliza */
            transition: opacity 0.2s;
        }

        .header-login-btn:active {
            opacity: 0.8;
        }

        .logout-btn {
            font-weight: 700;
            color: var(--accent-red);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }

        /* NAVEGAÇÃO */
        .nav-tabs {
            display: none; /* Oculto por padrão, aparece logado */
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            font-weight: 600;
        }

        .schedule-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .schedule-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel-card {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 14px;
            backdrop-filter: blur(8px);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }

        .admin-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-item {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .admin-item-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--white);
            margin: 0;
        }

        .admin-item-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        .admin-action {
            color: var(--accent-blue);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .admin-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .text-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.25);
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .text-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(24, 90, 219, 0.25);
        }

        .repertoire-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .repertoire-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        .repertoire-list::-webkit-scrollbar {
            width: 6px;
        }

        .repertoire-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .repertoire-list::-webkit-scrollbar-thumb {
            background: rgba(24, 90, 219, 0.8);
            border-radius: 10px;
        }

        .repertoire-item {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
            padding: 12px;
        }

        .repertoire-item-title {
            font-size: 13px;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: var(--white);
        }

        .repertoire-item-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }

        .repertoire-link {
            color: var(--accent-blue);
            text-decoration: underline;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 210px;
            display: inline-block;
        }

        .repertoire-edit {
            color: var(--accent-blue);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .view-section {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 20px;
        }

        .view-section.active {
            display: flex;
        }

        .member-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .member-tag {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginOverlay">
        <div class="login-card">
            <span class="close-login" onclick="toggleLogin(false)">&times;</span>
            <div class="logo-text" style="font-size: 24px; margin-bottom: 5px;">Ministério <span>AMAR</span></div>
            <p>Juntos até a Eternidade</p>
            
            <input type="text" id="loginUser" class="login-input" placeholder="Usuário">
            <input type="password" id="loginPass" class="login-input" placeholder="Senha">
            
            <button onclick="fazerLogin()" class="btn-send" style="padding: 12px;">
                <span>Acessar Sistema</span>
            </button>
            
            <p id="loginError" style="color: var(--accent-red); margin-top: 15px; font-size: 12px; display: none;">Usuário ou senha incorretos!</p>
        </div>
    </div>

    <header>
        <div class="logo-text">Ministério <span>AMAR</span></div>
        <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.8;">Juntos até a Eternidade</p>
        
        <div id="userBadge" class="user-badge" style="display: none;">
            <span id="userNameText">Logado</span>
            <span class="logout-btn" onclick="fazerLogout()">Sair</span>
        </div>
        <button id="headerLoginBtn" class="header-login-btn" onclick="toggleLogin(true)">Entrar</button>

        <nav id="mainNav" class="nav-tabs">
            <button id="navHome" class="nav-btn active" onclick="switchView('home')">Início</button>
            <button id="navSchedule" class="nav-btn" onclick="switchView('schedule')">Cronograma</button>
            <button id="navRepertoire" class="nav-btn" onclick="switchView('repertoire')">Repertório</button>
            <button id="navAdmin" class="nav-btn" style="display:none" onclick="switchView('admin')">Admin</button>
        </nav>
    </header>

    <div class="container">
        
        <!-- VIEW: HOME (Envio de Escala) -->
        <div id="homeView" class="view-section active">
            <div id="smartSection" class="input-group" style="display:none">
                    <div class="upload-section" id="smartCard" style="border-style: solid; background-color: var(--card-bg); border-width: 1px; border-color: rgba(255,255,255,0.2);">
                    <div id="mondayBadge" style="display:none; background-color: var(--dark-green); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; margin-bottom: 8px; width: fit-content; margin-left: auto; margin-right: auto;">📢 DIA DE ENVIO (SEGUNDA)</div>
                    <p id="smartTitle" style="margin: 0; font-weight: bold; color: var(--white)"></p>
                    <img id="smartPreview" class="preview-image" style="display: block; margin: 10px auto">
                    <button id="sendSmartBtn" class="btn-send" style="padding: 10px; font-size: 14px; margin-top: 10px">
                        <span>Enviar Escala para o Grupo</span>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label for="message"></label>
                <textarea id="message" placeholder="Opcional: Digite um aviso extra aqui..."></textarea>
            </div>

            <!-- Elementos ocultos necessários para o funcionamento do script -->
            <input type="file" id="fileInput" accept="image/*" style="display: none">
            <img id="preview" style="display: none">
            <div id="uploadLabel" style="display: none"></div>
            <button id="sendBtn" style="display: none"></button>

            <div class="quick-messages">
                <label id="gridLabel">Escalas do Mês</label>
                <div id="scalesGrid" class="quick-grid">
                    <!-- Preenchido via JavaScript -->
                </div>
            </div>
        </div>

        <!-- VIEW: SCHEDULE (Cronograma Completo) -->
        <div id="scheduleView" class="view-section">
            <div id="fullScheduleSection" class="panel-card">
                <label>Cronograma Completo 2026</label>
                <div id="fullScheduleGrid" class="quick-grid" style="margin-top: 8px; margin-bottom: 0;">
                    <!-- Preenchido via JS -->
                </div>
            </div>
        </div>

        <div id="repertoireView" class="view-section">
            <div class="panel-card">
                <label>Adicionar Música</label>
                <div class="repertoire-form">
                    <input id="repertoireName" class="text-input" type="text" placeholder="Nome da música">
                    <input id="repertoireLink" class="text-input" type="url" placeholder="Link (YouTube/Drive/Spotify)">
                    <button id="addRepertoireBtn" class="btn-send" style="padding: 10px; font-size: 14px;">
                        <span>Adicionar Música</span>
                    </button>
                </div>
            </div>

            <div id="repertoireSection" class="panel-card">
                <label>Músicas Cadastradas</label>
                <div id="repertoireList" class="repertoire-list"></div>
            </div>
        </div>

        <div id="adminView" class="view-section">
            <div class="admin-grid">
                <div class="panel-card">
                    <label>Credenciais (Usuários)</label>
                    <div class="repertoire-form">
                        <input id="adminNewUsername" class="text-input" type="text" placeholder="Usuário">
                        <input id="adminNewPassword" class="text-input" type="password" placeholder="Senha">
                        <label class="admin-toggle">
                            <input id="adminNewIsAdmin" type="checkbox">
                            Admin
                        </label>
                        <button id="adminCreateUserBtn" class="btn-send" style="padding: 10px; font-size: 14px;">
                            <span>Criar Usuário</span>
                        </button>
                    </div>
                    <div id="adminUsersList" class="admin-list"></div>
                </div>

                <div class="panel-card">
                    <label>Membros</label>
                    <div class="repertoire-form">
                        <input id="adminMemberName" class="text-input" type="text" placeholder="Nome do membro">
                        <button id="adminCreateMemberBtn" class="btn-send" style="padding: 10px; font-size: 14px;">
                            <span>Adicionar Membro</span>
                        </button>
                    </div>
                    <div id="adminMembersList" class="admin-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        Para usar como App no iPhone:<br>
        Toque no ícone <b>Compartilhar</b> e selecione <b>"Tela de Início"</b>.
    </div>

    <!-- Modal para Zoom da Imagem -->

        async function apiJson(path, options = {}) {
            const res = await fetch(path, {
                ...options,
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                }
            });
            const data = await res.json().catch(() => null);
            return { ok: res.ok, status: res.status, data };
        }

        async function fazerLogin() {

        function normalizarLink(link) {
            const trimmed = (link || '').trim();
            if (!trimmed) return '';
            const withProtocol = /^https?:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
            try {
                new URL(withProtocol);
                return withProtocol;
            } catch {
                return '';
            }
        }

        async function carregarRepertorio() {
            const result = await apiJson('/api/repertoire', { method: 'GET' });
            if (!result.ok || !result.data || !result.data.ok) {
                repertoireItems = [];
                return;
            }
            repertoireItems = Array.isArray(result.data.items) ? result.data.items : [];
        }

        async function adicionarRepertorio() {
            if (!repertoireName || !repertoireLink) return;
            const nome = repertoireName.value.trim();
            const link = normalizarLink(repertoireLink.value);

            if (!nome || !link) {
                alert('Preencha o nome e um link válido.');
                return;
            }

            if (repertoireEditingId !== null) {
                const result = await apiJson('/api/repertoire', {
                    method: 'PUT',
                    body: JSON.stringify({ id: repertoireEditingId, name: nome, link })
                });
                if (!result.ok || !result.data || !result.data.ok) {
                    alert('Erro ao salvar a alteração.');
                    return;
                }
            } else {
                const result = await apiJson('/api/repertoire', {
                    method: 'POST',
                    body: JSON.stringify({ name: nome, link })
                });
                if (!result.ok || !result.data || !result.data.ok) {
                    alert('Erro ao adicionar música.');
                    return;
                }
            }

            resetarFormularioRepertorio();
            await carregarRepertorio();
            renderizarRepertorio();
        }

        function iniciarEdicaoRepertorio(id) {
            const item = repertoireItems.find((x) => Number(x.id) === Number(id));
            if (!item || !repertoireName || !repertoireLink) return;

            repertoireEditingId = Number(item.id);
            repertoireName.value = item.name || '';
            repertoireLink.value = item.link || '';

            const label = addRepertoireBtn ? addRepertoireBtn.querySelector('span') : null;
            if (label) label.innerText = 'Salvar Alteração';
            repertoireName.focus();
        }

        function resetarFormularioRepertorio() {
            repertoireEditingId = null;
            if (repertoireName) repertoireName.value = '';
            if (repertoireLink) repertoireLink.value = '';
            const label = addRepertoireBtn ? addRepertoireBtn.querySelector('span') : null;
            if (label) label.innerText = 'Adicionar Música';
        }

        function renderizarRepertorio() {
            if (!repertoireList) return;
            repertoireList.innerHTML = '';

            if (repertoireItems.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'repertoire-item';
                empty.innerHTML = '<div style="font-size: 12px; color: rgba(255,255,255,0.6);">Nenhuma música cadastrada ainda.</div>';
                repertoireList.appendChild(empty);
                return;
            }

            repertoireItems.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'repertoire-item';

                const safeNome = (item && item.name) ? String(item.name) : 'Sem nome';
                const safeLink = (item && item.link) ? String(item.link) : '';
                const safeId = Number(item && item.id);

                card.innerHTML = `
                    <div class="repertoire-item-title">${safeNome}</div>
                    <div class="repertoire-item-actions">
                        <a class="repertoire-link" href="${safeLink}" target="_blank" rel="noopener noreferrer">${safeLink}</a>
                        <span class="repertoire-edit" data-id="${safeId}">Editar</span>
                    </div>
                `;

                repertoireList.appendChild(card);
            });

            repertoireList.querySelectorAll('.repertoire-edit').forEach((el) => {
                el.addEventListener('click', () => {
                    const id = Number(el.getAttribute('data-id'));
                    if (!Number.isNaN(id)) iniciarEdicaoRepertorio(id);
                });
            });
        }

            adminUsers = Array.isArray(result.data.users) ? result.data.users : [];

        async function adminCarregarMembros() {

        function adminRenderUsuarios() {
            if (!adminUsersList) return;
            adminUsersList.innerHTML = '';

            if (adminUsers.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'admin-item';

            adminUsers.forEach((u) => {

                        <div class="admin-item-title">${username}</div>
                        <div class="admin-item-sub">${isAdmin ? 'Admin' : 'Usuário'}</div>

                adminUsersList.appendChild(item);

        function adminRenderMembros() {
            if (!adminMembersList) return;
            adminMembersList.innerHTML = '';

            if (adminMembers.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'admin-item';
                empty.innerHTML = '<div style="font-size: 12px; color: rgba(255,255,255,0.6);">Nenhum membro cadastrado.</div>';

                return;

            adminMembers.forEach((m) => {
                const item = document.createElement('div');
                item.className = 'admin-item';
                const id = Number(m && m.id);
                const name = m && m.name ? String(m.name) : '';
                const active = Boolean(m && m.active);

                item.innerHTML = `
                    <div style="min-width: 0;">
                        <div class="admin-item-title">${name}</div>
                        <div class="admin-item-sub">${active ? 'Ativo' : 'Inativo'}</div>
                    </div>
                    <div style="display:flex; gap:12px; align-items:center;">
                        <label class="admin-toggle">

                adminMembersList.appendChild(item);

            adminMembersList.querySelectorAll('input[type="checkbox"][data-id]').forEach((el) => {
                el.addEventListener('change', async () => {
                    const id = Number(el.getAttribute('data-id'));

                el.addEventListener('click', () => {

                    adminMemberEditingId = id;

        async function adminCriarUsuario() {
            if (!adminNewUsername || !adminNewPassword) return;
            const username = adminNewUsername.value.trim();
            const password = adminNewPassword.value.trim();
            const isAdmin = Boolean(adminNewIsAdmin && adminNewIsAdmin.checked);

            if (!username || !password) {
                alert('Preencha usuário e senha.');
                return;
            }

            const result = await apiJson('/api/users', {
                method: 'POST',
                body: JSON.stringify({ username, password, isAdmin })
            });

            if (!result.ok || !result.data || !result.data.ok) {
                alert('Erro ao criar usuário.');
                return;
            }

            adminNewUsername.value = '';
            adminNewPassword.value = '';
            if (adminNewIsAdmin) adminNewIsAdmin.checked = false;

            await adminCarregarUsuarios();
            adminRenderUsuarios();
        }

        async function adminCriarMembro() {
            if (!adminMemberName) return;
            const name = adminMemberName.value.trim();
            if (!name) {
                alert('Preencha o nome do membro.');
                return;
            }

            if (adminMemberEditingId !== null) {
                const result = await apiJson('/api/members', {
                    method: 'PUT',
                    body: JSON.stringify({ id: adminMemberEditingId, name })
                });
                if (!result.ok || !result.data || !result.data.ok) {
                    alert('Erro ao salvar membro.');
                    return;
                }
            } else {
                const result = await apiJson('/api/members', {
                    method: 'POST',
                    body: JSON.stringify({ name })
                });
                if (!result.ok || !result.data || !result.data.ok) {
                    alert('Erro ao adicionar membro.');
                    return;

            adminMemberEditingId = null;
            adminMemberName.value = '';

            adminRenderMembros();

        async function verificarSessao() {
            const result = await apiJson('/api/me', { method: 'GET' }).catch(() => ({ ok: false, data: null }));
            currentUser = result && result.data && result.data.ok ? result.data.user : null;

            const isLogged = Boolean(currentUser);
            if (userNameText) userNameText.innerText = isLogged ? currentUser.username : 'Logado';

            if (isLogged) {
                if (userBadge) userBadge.style.display = 'flex';
                if (headerLoginBtn) headerLoginBtn.style.display = 'none';
                if (mainNav) mainNav.style.display = 'flex';
                if (sendSmartBtn) sendSmartBtn.style.display = 'flex';
                renderizarCronogramaCompleto();
                await carregarRepertorio();
                renderizarRepertorio();
                if (navAdmin) navAdmin.style.display = currentUser && currentUser.isAdmin ? 'inline-block' : 'none';
                if (currentUser && currentUser.isAdmin) {
                    await adminCarregarUsuarios();
                    await adminCarregarMembros();
                    adminRenderUsuarios();
                    adminRenderMembros();
                }
            } else {
                if (userBadge) userBadge.style.display = 'none';
                if (headerLoginBtn) headerLoginBtn.style.display = 'block';
                if (mainNav) mainNav.style.display = 'none';
                if (sendSmartBtn) sendSmartBtn.style.display = 'none';
                if (navAdmin) navAdmin.style.display = 'none';
                switchView('home');
            }
        }

        function switchView(viewName) {
            homeView.classList.remove('active');
            scheduleView.classList.remove('active');
            if (repertoireView) repertoireView.classList.remove('active');
            if (adminView) adminView.classList.remove('active');

            navHome.classList.remove('active');
            navSchedule.classList.remove('active');
            if (navRepertoire) navRepertoire.classList.remove('active');
            if (navAdmin) navAdmin.classList.remove('active');

            if (viewName === 'schedule') {
                scheduleView.classList.add('active');
                navSchedule.classList.add('active');
            } else if (viewName === 'repertoire') {
                if (repertoireView) repertoireView.classList.add('active');
                if (navRepertoire) navRepertoire.classList.add('active');
                renderizarRepertorio();
            } else if (viewName === 'admin') {
                if (adminView) adminView.classList.add('active');
                if (navAdmin) navAdmin.classList.add('active');
                adminRenderUsuarios();
                adminRenderMembros();
            } else {
                homeView.classList.add('active');
                navHome.classList.add('active');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

            if (!fullScheduleGrid) return;
            fullScheduleGrid.innerHTML = '';
            
            // Ordenar por data (aproximado pelo formato DD-MM)
            const datasOrdenadas = Object.keys(ESCALA_MAPPING).sort((a, b) => {
                const [da, ma] = a.split('-').map(Number);
                const [db, mb] = b.split('-').map(Number);
                return (ma * 100 + da) - (mb * 100 + db);
            });

            datasOrdenadas.forEach(data => {
                const membros = ESCALA_MAPPING[data];
                const arquivo = listaEscalas.find(f => f.includes(data));
                
                const card = document.createElement('div');
                card.className = 'quick-card';
                card.style.cursor = 'default';
                
                let memberTags = membros.map(m => `<span class="member-tag">${m}</span>`).join('');
                
                card.innerHTML = `
                    <div style="display: flex; flex-direction: column; height: 100%; justify-content: space-between;">
                        <div style="margin-bottom: 8px;">
                            <h4 style="color: var(--accent-blue); font-size: 14px;">Domingo ${data.replace('-', '/')}</h4>
                            <div style="height: 1px; background: rgba(24, 90, 219, 0.3); margin: 6px 0;"></div>
                        </div>
                        <div class="member-list" style="margin-top: 0;">
                            ${memberTags}
                        </div>
                        <div style="margin-top: 10px; font-size: 9px; opacity: 0.5; text-align: right; color: var(--accent-blue);">
                            Clique p/ enviar
                        </div>
                    </div>
                `;
                
                if (arquivo) {
                    card.style.cursor = 'pointer';
                    card.onclick = () => carregarEscalaManual(arquivo, data.replace('-', '/'));
                }
                
                fullScheduleGrid.appendChild(card);
            });

            fullScheduleSection.style.display = 'block';
        }

        // Função unificada de compartilhamento
        async function compartilhar(arquivo, texto) {
            try {
                if (!navigator.share) {
                    alert("Seu navegador não suporta compartilhamento. Use o Safari no iPhone.");
                    return;
                }

                const shareData = {
                    title: 'WhatsMinister',
                    text: texto || ''
                };

                if (arquivo) {
                    shareData.files = [arquivo];
                }

                await navigator.share(shareData);
                console.log("Compartilhado com sucesso!");
            } catch (err) {
                console.error("Erro no compartilhamento:", err);
                if (err.name !== 'AbortError') {
                    alert("Erro ao enviar: " + err.message);
                }
            }
        }

        // Lógica de Inteligência (Auto-detectar escala)
        function detectarEscala() {
            const hoje = new Date();
            const diaSemana = hoje.getDay();

            if (diaSemana === 1 && mondayBadge) {
                mondayBadge.style.display = 'block';
            }

            let diasParaDomingo = (7 - diaSemana) % 7;
            if (diasParaDomingo === 0) diasParaDomingo = 7; 

            const proximoDomingo = new Date(hoje);
            proximoDomingo.setDate(hoje.getDate() + diasParaDomingo);
            
            const dd = String(proximoDomingo.getDate()).padStart(2, '0');
            const mm = String(proximoDomingo.getMonth() + 1).padStart(2, '0');
            const dataProcurada = `${dd}-${mm}`;
            
            const arquivoEncontrado = listaEscalas.find(f => f.includes(dataProcurada));
            
            if (arquivoEncontrado && smartSection && smartTitle && smartPreview && sendSmartBtn) {
                const urlImagem = `escalapronta/${arquivoEncontrado}`;
                smartTitle.innerText = `Escala de Domingo (${dd}/${mm})`;
                smartPreview.src = urlImagem;
                smartSection.style.display = 'block';
                
                // Mostrar botão de envio apenas se estiver logado
                const isLogged = Boolean(currentUser);
                sendSmartBtn.style.display = isLogged ? 'flex' : 'none';
                
                // Sugestão de texto automático para o campo de mensagem
                if (messageArea) {
                    messageArea.value = `Olá pessoal, segue a escala para o dia ${dd}/${mm}. Vamos nos organizar! 🙏`;
                }
                
                sendSmartBtn.onclick = async () => {
                    const text = (messageArea && messageArea.value.trim() !== '') ? messageArea.value : `Olá pessoal, segue a escala para o dia ${dd}/${mm}. Vamos nos organizar! 🙏`;
                    try {
                        const response = await fetch(urlImagem);
                        const blob = await response.blob();
                        const file = new File([blob], arquivoEncontrado, { type: 'image/png' });
                        await compartilhar(file, text);
                    } catch (e) {
                        alert("Erro ao carregar imagem sugerida. Tente selecionar manualmente abaixo.");
                    }
                };
            }

            if (scalesGrid) renderizarGradeEscalas(hoje);
        }

        function renderizarGradeEscalas(hoje) {
            if (!scalesGrid) return;
            scalesGrid.innerHTML = '';
            const mesAtual = hoje.getMonth() + 1;
            
            // Filtrar apenas as escalas do mês atual
            const escalasFiltradas = listaEscalas.filter(arquivo => {
                const partes = arquivo.split('_');
                const dataStr = partes[partes.length - 1].replace('.png', '');
                const [dia, mes] = dataStr.split('-').map(Number);
                return mes === mesAtual;
            });

            if (escalasFiltradas.length === 0) {
                scalesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 14px; padding: 20px;">Nenhuma escala encontrada para este mês.</p>';
                return;
            }
            
            escalasFiltradas.forEach(arquivo => {
                const partes = arquivo.split('_');
                const dataStr = partes[partes.length - 1].replace('.png', ''); // "22-03"
                const [dia, mes] = dataStr.split('-').map(Number);
                
                // Assumindo o ano atual
                const dataEscala = new Date(hoje.getFullYear(), mes - 1, dia);
                
                // Se a data já passou (comparando apenas o dia, sem hora)
                const hojeZerado = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
                const escalaZerada = new Date(dataEscala.getFullYear(), dataEscala.getMonth(), dataEscala.getDate());
                
                const jaPassou = escalaZerada < hojeZerado;
                
                const card = document.createElement('div');
                card.className = 'quick-card';
                card.onclick = () => carregarEscalaManual(arquivo, dataStr.replace('-', '/'));
                
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <h4>Escala ${dataStr.replace('-', '/')}</h4>
                        <span class="status-badge ${jaPassou ? 'status-past' : 'status-upcoming'}">
                            ${jaPassou ? 'Passou' : 'Pendente'}
                        </span>
                    </div>
                    <p>${arquivo}</p>
                `;
                
                scalesGrid.appendChild(card);
            });
        }

        function carregarEscalaManual(arquivo, dataFormatada) {
            if (!smartSection || !smartTitle || !smartPreview || !sendSmartBtn) return;
            const urlImagem = `escalapronta/${arquivo}`;
            
            // Sugestão de texto automático para o campo de mensagem
            if (messageArea) {
                messageArea.value = `Olá pessoal, segue a escala para o dia ${dataFormatada}. Vamos nos organizar! 🙏`;
            }
            
            // Exibir preview na seção inteligente (reutilizando o espaço)
            smartSection.style.display = 'block';
            smartTitle.innerText = `Escala Selecionada (${dataFormatada})`;
            smartPreview.src = urlImagem;
            if (mondayBadge) mondayBadge.style.display = 'none';

            // Mostrar botão de envio apenas se estiver logado
            const isLogged = Boolean(currentUser);
            sendSmartBtn.style.display = isLogged ? 'flex' : 'none';

            sendSmartBtn.onclick = async () => {
                const finalMsg = (messageArea && messageArea.value.trim() !== '') ? messageArea.value : `Olá pessoal, segue a escala para o dia ${dataFormatada}. Vamos nos organizar! 🙏`;
                try {
                    const response = await fetch(urlImagem);
                    const blob = await response.blob();
                    const file = new File([blob], arquivo, { type: 'image/png' });
                    await compartilhar(file, finalMsg);
                } catch (e) {
                    alert("Erro ao enviar: " + e.message);
                }
            };
            
            // Scroll suave para o topo
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateSendButton() {
            if (!sendBtn) return;
            const hasText = messageArea && messageArea.value.trim() !== '';
            const hasFile = fileInput && fileInput.files.length > 0;
            sendBtn.disabled = !(hasText || hasFile);
        }

        // Função para mensagens rápidas
        function setQuickMessage(title, content) {
            if (!messageArea) return;
            messageArea.value = content;
            if (sendBtn) sendBtn.disabled = false;
            
            // Pequena animação de feedback
            messageArea.style.backgroundColor = '#e8f5e9';
            setTimeout(() => {
                messageArea.style.backgroundColor = 'white';
            }, 300);
        }
    </script>
</body>
</html>
