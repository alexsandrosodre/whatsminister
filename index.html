<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ministerio de Louvor Amar - App</title>
    <meta name="description" content="App para envio de mensagens em grupo no WhatsApp">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WhatsMinister">
    <style>
        :root {
            --primary-blue: #0a1931;
            --accent-blue: #185adb;
            --accent-red: #ff0000;
            --bg-dark: #050a18;
            --white: #383737;
            --text-main: #030303;
            --text-secondary: #b0b0b0;
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 10, 24, 0.85), rgba(5, 10, 24, 0.85)), url('python/template.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: rgba(10, 25, 49, 0.9);
            color: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .logo-text {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo-text span {
            color: var(--accent-red);
        }

        .container {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            outline: none;
            background-color: var(--card-bg);
            color: var(--white);
            backdrop-filter: blur(5px);
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        .btn-send {
            background-color: var(--accent-blue);
            color: var(--white);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(24, 90, 219, 0.4);
            transition: transform 0.1s, opacity 0.2s, background-color 0.2s;
            width: 100%;
        }

        .btn-send:hover {
            background-color: #1e6aff;
        }

        .btn-send span {
            width: 100%;
            text-align: center;
        }

        .btn-send:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .quick-messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .upload-section {
            background-color: var(--card-bg);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background-color 0.2s, border-color 0.2s;
        }

        .upload-section:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: var(--white);
        }

        .preview-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .preview-image:active {
            transform: scale(1.02);
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 12px;
        }

        .status-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-past {
            background-color: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
        }

        .status-upcoming {
            background-color: rgba(0, 255, 0, 0.1);
            color: #4dff4d;
            border: 1px solid #4dff4d;
        }

        .quick-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quick-card:active {
            transform: scale(0.98);
            background-color: rgba(255,255,255,0.2);
        }

        .quick-card h4 {
            margin: 0;
            font-size: 16px;
            color: var(--white);
        }

        .quick-card p {
            margin: 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        #imageModal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #modalImg {
            max-width: 95%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .close-modal {
            color: white;
            font-size: 40px;
            font-weight: bold;
            position: absolute;
            top: 20px;
            right: 30px;
            cursor: pointer;
        }

        .footer-info {
            margin-top: auto;
            padding: 30px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Ministério <span>AMAR</span></div>
        <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.8;">Juntos até a Eternidade</p>
    </header>

    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="python/template.png" alt="Ministério AMAR" style="width: 100%; max-width: 300px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        </div>
        
        <div id="smartSection" class="input-group" style="display:none">
            
            <div class="upload-section" id="smartCard" style="border-style: solid; background-color: #f1f8e9; border-width: 2px;">
                <div id="mondayBadge" style="display:none; background-color: var(--dark-green); color: white; padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 8px; width: fit-content; margin-left: auto; margin-right: auto;">📢 DIA DE ENVIO (SEGUNDA)</div>
                <p id="smartTitle" style="margin: 0; font-weight: bold; color: var(--dark-green)"></p>
                <img id="smartPreview" class="preview-image" style="display: block; margin: 10px auto">
                <button id="sendSmartBtn" class="btn-send" style="padding: 10px; font-size: 14px; margin-top: 10px">
                    <span>Enviar Escala para o Grupo</span>
                </button>
            </div>
        </div>

        <div class="input-group">
            <label for="message">Mensagem Personalizada (Opcional)</label>
            <textarea id="message" placeholder="Opcional: Digite um aviso extra aqui..."></textarea>
        </div>

        <!-- Elementos ocultos necessários para o funcionamento do script -->
        <input type="file" id="fileInput" accept="image/*" style="display: none">
        <img id="preview" style="display: none">
        <div id="uploadLabel" style="display: none"></div>
        <button id="sendBtn" style="display: none"></button>

        <div class="quick-messages">
            <label id="gridLabel">Escalas do Mês</label>
            <div id="scalesGrid" class="quick-grid">
                <!-- Preenchido via JavaScript -->
            </div>
        </div>
    </div>

    <div class="footer-info">
        Para usar como App no iPhone:<br>
        Toque no ícone <b>Compartilhar</b> e selecione <b>"Tela de Início"</b>.
    </div>

    <!-- Modal para Zoom da Imagem -->
    <div id="imageModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg">
        <p id="modalCaption" style="color:white; margin-top:15px;"></p>
    </div>

    <script>
        // Função para fechar o modal
        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        // Abrir modal ao clicar em qualquer preview-image
        document.addEventListener('click', (e) => {
            if (e.target && e.target.classList.contains('preview-image')) {
                const modal = document.getElementById('imageModal');
                const modalImg = document.getElementById('modalImg');
                const modalCaption = document.getElementById('modalCaption');
                modal.style.display = "flex";
                modalImg.src = e.target.src;
                modalCaption.innerText = e.target.alt || e.target.id;
            }
        });

        // Variáveis globais de elementos (inicializadas dentro do DOMContentLoaded)
        let messageArea, sendBtn, fileInput, preview, uploadLabel, smartSection, smartTitle, smartPreview, sendSmartBtn, mondayBadge, scalesGrid;

        document.addEventListener('DOMContentLoaded', () => {
            messageArea = document.getElementById('message');
            sendBtn = document.getElementById('sendBtn');
            fileInput = document.getElementById('fileInput');
            preview = document.getElementById('preview');
            uploadLabel = document.getElementById('uploadLabel');
            smartSection = document.getElementById('smartSection');
            smartTitle = document.getElementById('smartTitle');
            smartPreview = document.getElementById('smartPreview');
            sendSmartBtn = document.getElementById('sendSmartBtn');
            mondayBadge = document.getElementById('mondayBadge');
            scalesGrid = document.getElementById('scalesGrid');

            // Chamar detecção ao carregar
            detectarEscala();
            
            // Habilitar/Desabilitar botão
            if (messageArea) messageArea.addEventListener('input', updateSendButton);
            
            // Listener de arquivo
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            preview.src = event.target.result;
                            preview.style.display = 'block';
                            if (uploadLabel) uploadLabel.style.display = 'none';
                            updateSendButton();
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
        });

        // Lista de arquivos na pasta escalapronta (gerada automaticamente pelo Trae)
        const listaEscalas = [
            "01 - escala_22-03.png", "02 - escala_29-03.png", "03 - escala_05-04.png",
            "04 - escala_12-04.png", "05 - escala_19-04.png", "06 - escala_26-04.png",
            "07 - escala_03-05.png", "08 - escala_10-05.png", "09 - escala_17-05.png",
            "10 - escala_24-05.png", "11 - escala_31-05.png", "12 - escala_07-06.png",
            "13 - escala_14-06.png", "14 - escala_21-06.png", "15 - escala_28-06.png",
            "16 - escala_05-07.png", "17 - escala_12-07.png", "18 - escala_19-07.png",
            "19 - escala_26-07.png", "20 - escala_02-08.png", "21 - escala_09-08.png",
            "22 - escala_16-08.png", "23 - escala_23-08.png", "24 - escala_30-08.png",
            "25 - escala_06-09.png", "26 - escala_13-09.png", "27 - escala_20-09.png",
            "28 - escala_27-09.png", "29 - escala_04-10.png", "30 - escala_11-10.png",
            "31 - escala_18-10.png", "32 - escala_25-10.png", "33 - escala_01-11.png",
            "34 - escala_08-11.png", "35 - escala_15-11.png", "36 - escala_22-11.png",
            "37 - escala_29-11.png", "38 - escala_06-12.png", "39 - escala_13-12.png",
            "40 - escala_20-12.png", "41 - escala_27-12.png"
        ];

        // Função unificada de compartilhamento
        async function compartilhar(arquivo, texto) {
            try {
                if (!navigator.share) {
                    alert("Seu navegador não suporta compartilhamento. Use o Safari no iPhone.");
                    return;
                }

                const shareData = {
                    title: 'WhatsMinister',
                    text: texto || ''
                };

                if (arquivo) {
                    shareData.files = [arquivo];
                }

                await navigator.share(shareData);
                console.log("Compartilhado com sucesso!");
            } catch (err) {
                console.error("Erro no compartilhamento:", err);
                if (err.name !== 'AbortError') {
                    alert("Erro ao enviar: " + err.message);
                }
            }
        }

        // Lógica de Inteligência (Auto-detectar escala)
        function detectarEscala() {
            const hoje = new Date();
            const diaSemana = hoje.getDay();

            if (diaSemana === 1 && mondayBadge) {
                mondayBadge.style.display = 'block';
            }

            let diasParaDomingo = (7 - diaSemana) % 7;
            if (diasParaDomingo === 0) diasParaDomingo = 7; 

            const proximoDomingo = new Date(hoje);
            proximoDomingo.setDate(hoje.getDate() + diasParaDomingo);
            
            const dd = String(proximoDomingo.getDate()).padStart(2, '0');
            const mm = String(proximoDomingo.getMonth() + 1).padStart(2, '0');
            const dataProcurada = `${dd}-${mm}`;
            
            const arquivoEncontrado = listaEscalas.find(f => f.includes(dataProcurada));
            
            if (arquivoEncontrado && smartSection && smartTitle && smartPreview && sendSmartBtn) {
                const urlImagem = `escalapronta/${arquivoEncontrado}`;
                smartTitle.innerText = `Escala de Domingo (${dd}/${mm})`;
                smartPreview.src = urlImagem;
                smartSection.style.display = 'block';
                
                // Sugestão de texto automático para o campo de mensagem
                if (messageArea) {
                    messageArea.value = `Olá pessoal, segue a escala para o próximo domingo (${dd}/${mm}). Deus Abençoe! 🙏`;
                }
                
                sendSmartBtn.onclick = async () => {
                    const text = (messageArea && messageArea.value.trim() !== '') ? messageArea.value : `Olá pessoal, segue a escala para o próximo domingo (${dd}/${mm}). Vamos nos organizar! 🙏`;
                    try {
                        const response = await fetch(urlImagem);
                        const blob = await response.blob();
                        const file = new File([blob], arquivoEncontrado, { type: 'image/png' });
                        await compartilhar(file, text);
                    } catch (e) {
                        alert("Erro ao carregar imagem sugerida. Tente selecionar manualmente abaixo.");
                    }
                };
            }

            if (scalesGrid) renderizarGradeEscalas(hoje);
        }

        function renderizarGradeEscalas(hoje) {
            if (!scalesGrid) return;
            scalesGrid.innerHTML = '';
            const mesAtual = hoje.getMonth() + 1;
            
            // Filtrar apenas as escalas do mês atual
            const escalasFiltradas = listaEscalas.filter(arquivo => {
                const partes = arquivo.split('_');
                const dataStr = partes[partes.length - 1].replace('.png', '');
                const [dia, mes] = dataStr.split('-').map(Number);
                return mes === mesAtual;
            });

            if (escalasFiltradas.length === 0) {
                scalesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 14px; padding: 20px;">Nenhuma escala encontrada para este mês.</p>';
                return;
            }
            
            escalasFiltradas.forEach(arquivo => {
                const partes = arquivo.split('_');
                const dataStr = partes[partes.length - 1].replace('.png', ''); // "22-03"
                const [dia, mes] = dataStr.split('-').map(Number);
                
                // Assumindo o ano atual
                const dataEscala = new Date(hoje.getFullYear(), mes - 1, dia);
                
                // Se a data já passou (comparando apenas o dia, sem hora)
                const hojeZerado = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
                const escalaZerada = new Date(dataEscala.getFullYear(), dataEscala.getMonth(), dataEscala.getDate());
                
                const jaPassou = escalaZerada < hojeZerado;
                
                const card = document.createElement('div');
                card.className = 'quick-card';
                card.onclick = () => carregarEscalaManual(arquivo, dataStr.replace('-', '/'));
                
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <h4>Escala ${dataStr.replace('-', '/')}</h4>
                        <span class="status-badge ${jaPassou ? 'status-past' : 'status-upcoming'}">
                            ${jaPassou ? 'Passou' : 'Pendente'}
                        </span>
                    </div>
                    <p>${arquivo}</p>
                `;
                
                scalesGrid.appendChild(card);
            });
        }

        function carregarEscalaManual(arquivo, dataFormatada) {
            if (!smartSection || !smartTitle || !smartPreview || !sendSmartBtn) return;
            const urlImagem = `escalapronta/${arquivo}`;
            
            // Sugestão de texto automático para o campo de mensagem
            if (messageArea) {
                messageArea.value = `Olá pessoal, segue a escala para o dia ${dataFormatada}. Vamos nos organizar! 🙏`;
            }
            
            // Exibir preview na seção inteligente (reutilizando o espaço)
            smartSection.style.display = 'block';
            smartTitle.innerText = `Escala Selecionada (${dataFormatada})`;
            smartPreview.src = urlImagem;
            if (mondayBadge) mondayBadge.style.display = 'none';

            sendSmartBtn.onclick = async () => {
                const finalMsg = (messageArea && messageArea.value.trim() !== '') ? messageArea.value : `Olá pessoal, segue a escala para o dia ${dataFormatada}. 🙏`;
                try {
                    const response = await fetch(urlImagem);
                    const blob = await response.blob();
                    const file = new File([blob], arquivo, { type: 'image/png' });
                    await compartilhar(file, finalMsg);
                } catch (e) {
                    alert("Erro ao enviar: " + e.message);
                }
            };
            
            // Scroll suave para o topo
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateSendButton() {
            if (!sendBtn) return;
            const hasText = messageArea && messageArea.value.trim() !== '';
            const hasFile = fileInput && fileInput.files.length > 0;
            sendBtn.disabled = !(hasText || hasFile);
        }

        // Função para mensagens rápidas
        function setQuickMessage(title, content) {
            if (!messageArea) return;
            messageArea.value = content;
            if (sendBtn) sendBtn.disabled = false;
            
            // Pequena animação de feedback
            messageArea.style.backgroundColor = '#e8f5e9';
            setTimeout(() => {
                messageArea.style.backgroundColor = 'white';
            }, 300);
        }
    </script>
</body>
</html>
